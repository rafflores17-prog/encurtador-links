<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MinilinkXPRO - Encurtador de Links</title>
  <style>
    body {
      background: #f9fafb;
      font-family: "Poppins", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      color: #16a34a;
      letter-spacing: -0.5px;
    }

    h1 span {
      color: #065f46;
      font-weight: 700;
      font-size: 2rem;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 2px solid #d1d5db;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input:focus {
      border-color: #22c55e;
      outline: none;
    }

    button {
      width: 100%;
      background: #22c55e;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #16a34a;
    }

    .resultado {
      margin-top: 1.5rem;
      font-size: 15px;
      color: #111;
    }

    .link-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f1f5f9;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px;
      margin-top: 0.5rem;
      word-break: break-all;
    }

    .link-box a {
      color: #16a34a;
      text-decoration: none;
      flex: 1;
      margin-right: 8px;
    }

    .copy-btn {
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .copy-btn:hover {
      background: #16a34a;
    }

    footer {
      margin-top: 2rem;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MiniLink<span>XPRO</span></h1>
    <input id="urlInput" type="url" placeholder="Cole sua URL aqui..." />
    <button id="btnEncurtar">Encurtar</button>

    <div class="resultado" id="resultado"></div>

    <footer>© 2025 MinilinkXPRO — Todos os direitos reservados.</footer>
  </div>

  <script>
    const input = document.getElementById("urlInput");
    const btn = document.getElementById("btnEncurtar");
    const resultado = document.getElementById("resultado");

    btn.addEventListener("click", async () => {
      const url = input.value.trim();

      if (!url) {
        alert("Por favor, insira uma URL válida!");
        return;
      }

      resultado.textContent = "Gerando link curto...";

      try {
        // Chama a rota /encurtar do servidor
        const resp = await fetch(`/encurtar?url=${encodeURIComponent(url)}`);
        const data = await resp.json();

        if (data.link_curto) {
          resultado.innerHTML = `
            <div class="link-box">
              <a href="${data.link_curto}" target="_blank">${data.link_curto}</a>
              <button class="copy-btn" onclick="copyLink('${data.link_curto}')">📋</button>
            </div>
          `;
        } else {
          resultado.textContent = data.erro || "Erro ao encurtar o link.";
        }
      } catch (err) {
        console.error(err);
        alert("Erro de conexão com o servidor.");
        resultado.textContent = "";
      }
    });

    function copyLink(link) {
      navigator.clipboard.writeText(link);
      alert("Link copiado com sucesso!");
    }
  </script>
</body>
</html>
