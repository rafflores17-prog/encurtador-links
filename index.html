<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGDV LINKS | Premium Shortener</title>

<meta name="description" content="Encurtador de links rápido, seguro e profissional.">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">

<!-- CSS com versão (ANTI BUG CACHE) -->
<link rel="stylesheet" href="style.css?v=3">

<!-- Fonte -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="app-container">

<header>
  <div class="logo">BGDV<span>LINKS</span></div>
  <p class="tagline">Encurtador inteligente e rápido</p>
</header>

<main>

<section class="main-card">

  <div class="input-group">
    <label>Cole sua URL</label>
    <input id="long-url-input" type="url" placeholder="https://exemplo.com">
  </div>

  <button id="shorten-btn" class="glow-button">ENCURTAR LINK</button>

  <div id="result-area" class="hidden">
    <input type="text" id="short-url-output" readonly>
    <button onclick="copiarLink()">COPIAR</button>
  </div>

</section>

</main>

<footer>
  <p>© 2026 BGDV LINKS</p>
</footer>

</div>

<!-- SCRIPT com versão -->
<script src="script.js?v=3"></script>

<!-- REGISTRO SW CORRIGIDO -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(reg => {
    reg.onupdatefound = () => {
      const newWorker = reg.installing;
      newWorker.onstatechange = () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          location.reload();
        }
      };
    };
  });
}
</script>

</body>
</html>
