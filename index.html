<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BGDV LINKS | Premium Shortener</title>
    
    <link rel="manifest" href="/manifest.json">
    
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BGDV LINKS">
    
    <link rel="apple-touch-icon" href="/icon-512.png">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo">BGDV<span>LINKS</span></div>
            <p class="tagline">O seu encurtador inteligente</p>
        </header>

        <main>
            <div class="ad-unit top-ad">
                <span>Espaço Publicitário</span>
            </div>

            <section class="main-card">
                <div class="input-group">
                    <label>Cole sua URL longa</label>
                    <input id="long-url-input" type="url" placeholder="https://exemplo.com/link-gigante" />
                </div>
                
                <button id="shorten-btn" class="glow-button">ENCURTAR LINK</button>

                <div id="result-area" class="hidden animate-in">
                    <div class="result-box">
                        <label>Seu link curto pronto:</label>
                        <div class="copy-wrapper">
                            <input type="text" id="short-url-output" readonly>
                            <button onclick="copiarLink()" class="inner-copy">Copiar</button>
                        </div>
                    </div>
                </div>
            </section>

            <div class="ad-unit side-ad">
                <span>Espaço Publicitário</span>
            </div>

            <section class="features-grid">
                <div class="f-item">
                    <span class="icon">⚡</span>
                    <h4>Instantâneo</h4>
                </div>
                <div class="f-item">
                    <span class="icon">🛡️</span>
                    <h4>Seguro</h4>
                </div>
                <div class="f-item">
                    <span class="icon">📱</span>
                    <h4>Mobile-First</h4>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2026 BGDV LINKS</p>
            <nav>
                <a href="#">Termos</a> • <a href="#">Privacidade</a>
            </nav>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
