<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniLinkXPRO</title>
  <style>
    body {
      background: #f9fafb;
      font-family: "Poppins", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #fff;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    h1 {
      font-size: 28px;
      color: #1a9b46;
      margin-bottom: 20px;
      font-weight: 700;
    }

    h1 span {
      color: #00662e;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      margin-bottom: 15px;
      outline: none;
    }

    button {
      background: #1a9b46;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #128039;
    }

    .result-box {
      background: #e8f9ee;
      border: 1px solid #cde9d4;
      border-radius: 10px;
      padding: 15px;
      margin-top: 15px;
      text-align: center;
    }

    .short-link {
      display: block;
      color: #00662e;
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 10px;
      word-break: break-all;
    }

    .copy-btn {
      background: #1a9b46;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    footer {
      margin-top: 20px;
      font-size: 13px;
      color: #555;
    }

    footer span {
      color: #1a9b46;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1><span>MiniLink</span>XPRO</h1>

    <input type="text" id="originalLink" placeholder="Cole o link aqui..." />
    <button onclick="encurtarLink()">Encurtar</button>

    <div id="result" class="result-box" style="display: none;">
      <a id="shortLink" class="short-link" href="#" target="_blank"></a>
      <button class="copy-btn" onclick="copiarLink()">Copiar</button>
    </div>
  </div>

  <footer>© 2025 <span>MiniLinkXPRO</span> — Todos os direitos reservados</footer>

  <script>
    function encurtarLink() {
      const original = document.getElementById("originalLink").value.trim();
      if (!original) {
        alert("Por favor, cole um link válido!");
        return;
      }

      const codigo = Math.random().toString(36).substring(2, 8);
      const short = "http://mlklads.onrender.com/" + codigo;

      const linkEl = document.getElementById("shortLink");
      linkEl.href = short;
      linkEl.textContent = short;

      document.getElementById("result").style.display = "block";
    }

    function copiarLink() {
      const link = document.getElementById("shortLink").textContent;
      navigator.clipboard.writeText(link);
      alert("Link copiado!");
    }
  </script>
</body>
</html>
