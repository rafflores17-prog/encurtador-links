<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MinilinkXpro</title>
  <style>
    body {
      background: #f9fafb;
      font-family: "Poppins", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 2rem;
      border-radius: 20px;
      box-shadow: 0 4px 25px rgba(0, 0, 0, 0.08);
      text-align: center;
      width: 90%;
      max-width: 420px;
    }

    h2 {
      color: #16a34a;
      margin-bottom: 1.5rem;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #d1d5db;
      border-radius: 10px;
      margin-bottom: 1rem;
      font-size: 16px;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #22c55e;
      outline: none;
    }

    button {
      width: 100%;
      background: #22c55e;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #16a34a;
    }

    .resultado {
      margin-top: 1.2rem;
      font-size: 15px;
      color: #111;
    }

    .caixa-link {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      padding: 10px;
      border-radius: 8px;
      margin-top: 0.5rem;
      word-break: break-all;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .caixa-link a {
      color: #166534;
      text-decoration: none;
    }

    .copy-btn {
      background: #16a34a;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .copy-btn:hover {
      background: #15803d;
    }

    footer {
      margin-top: 2rem;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🔗 MinilinkXpro</h2>
    <input id="urlInput" type="url" placeholder="Cole sua URL aqui..." />
    <button id="btnEncurtar">Encurtar</button>

    <div class="resultado" id="resultado"></div>

    <footer>© 2025 MinilinkXpro — Todos os direitos reservados</footer>
  </div>

  <script>
    const input = document.getElementById("urlInput");
    const btn = document.getElementById("btnEncurtar");
    const resultado = document.getElementById("resultado");

    btn.addEventListener("click", async () => {
      const url = input.value.trim();

      if (!url) {
        alert("Por favor, insira uma URL válida!");
        return;
      }

      resultado.innerHTML = "Gerando link curto...";

      try {
        const resp = await fetch(`/encurtar?url=${encodeURIComponent(url)}`);
        const data = await resp.json();

        if (data.link_curto) {
          resultado.innerHTML = `
            ✅ Seu link curto:
            <div class="caixa-link">
              <a href="${data.link_curto}" target="_blank">${data.link_curto}</a>
              <button class="copy-btn" onclick="copiarLink('${data.link_curto}')">Copiar</button>
            </div>
          `;
        } else {
          resultado.textContent = data.erro || "Erro ao encurtar o link.";
        }
      } catch (err) {
        console.error(err);
        resultado.textContent = "Erro de conexão com o servidor.";
      }
    });

    function copiarLink(link) {
      navigator.clipboard.writeText(link).then(() => {
        alert("Link copiado com sucesso!");
      });
    }
  </script>
</body>
</html>
