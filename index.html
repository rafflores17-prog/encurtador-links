    <script src="script.js"></script>

    <!-- 🔥 SCRIPT QUE RESOLVE TUDO -->
    <script>
    document.addEventListener("click", function(e) {
        let link = e.target.closest("a");
        if (!link) return;

        let url = link.href;

        // Se for interno, deixa normal
        if (url.includes("bgdv.online")) return;

        e.preventDefault();

        try {
            // Força abrir no Chrome (Android)
            let intent = "intent://" + url.replace(/^https?:\/\//, '') + "#Intent;scheme=https;package=com.android.chrome;end";
            window.location.href = intent;
        } catch (err) {
            // fallback
            window.location.href = url;
        }
    });
    </script>
