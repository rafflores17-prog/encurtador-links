<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>BGDV LINKS | Premium Shortener</title>

<link rel="stylesheet" href="style.css">

<style>

/* 🔥 CAIXA MAIS BONITA SEM QUEBRAR LAYOUT */
.copy-wrapper {
    display: flex;
    gap: 6px;
    margin-top: 6px;
}

.copy-wrapper input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #334155;
}

/* BOTÃO ABRIR */
.btn-open {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    border: none;
    color: white;
    padding: 10px 12px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

/* INPUT SLUG */
.slug-input {
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #334155;
    width: 100%;
}

</style>

</head>

<body>

<div class="app-container">

<header>
    <div class="logo">BGDV<span>LINKS</span></div>
    <p class="tagline">O seu encurtador inteligente</p>
</header>

<main>

<section class="main-card">

<div class="input-group">
    <label>Cole sua URL longa</label>
    <input id="long-url-input" type="url" placeholder="https://exemplo.com" />
</div>

<!-- 🔥 NOVO (OPCIONAL) -->
<input id="slug-input" class="slug-input" placeholder="Personalizar link (opcional) ex: meu-link">

<button id="shorten-btn" class="glow-button">ENCURTAR LINK</button>

<div id="result-area" class="hidden animate-in">
    <div class="result-box">

        <label>Seu link curto pronto:</label>

        <div class="copy-wrapper">
            <input type="text" id="short-url-output" readonly>

            <button onclick="copiarLink()" class="inner-copy">Copiar</button>

            <button onclick="abrirLink()" class="btn-open">Abrir</button>
        </div>

    </div>
</div>

</section>

</main>

<footer>
<p>© 2026 BGDV LINKS - Todos os direitos reservados.</p>

<nav>
<a href="/privacidade.html">Privacidade</a> • 
<a href="/termos.html">Termos</a> • 
<a href="/dicas.html">Dicas</a>
</nav>
</footer>

</div>

<script src="script.js"></script>

<!-- 🔥 SCRIPT SEGURO (SEM QUEBRAR SUA LÓGICA) -->
<script>

// VALIDAR URL
function validarURL(url) {
    try {
        let u = new URL(url);
        return u.protocol === "http:" || u.protocol === "https:";
    } catch {
        return false;
    }
}

// VALIDAR AO CLICAR
document.getElementById("shorten-btn").addEventListener("click", function(e) {
    let input = document.getElementById("long-url-input").value;

    if (!validarURL(input)) {
        e.preventDefault();
        alert("Digite uma URL válida! Ex: https://google.com");
    }
});

// COPIAR
function copiarLink() {
    let texto = document.getElementById("short-url-output").value;
    if (!texto) return;
    navigator.clipboard.writeText(texto);
}

// ABRIR FORA DO APP
function abrirLink() {
    let url = document.getElementById("short-url-output").value;
    if (!url) return;

    let intent = "intent://" + url.replace(/^https?:\/\//, '') + "#Intent;scheme=https;package=com.android.chrome;end";
    window.location.href = intent;
}

// INTERCEPTAR LINKS EXTERNOS
document.addEventListener("click", function(e) {
    let link = e.target.closest("a");
    if (!link) return;

    let url = link.href;

    if (url.includes("bgdv.online")) return;

    e.preventDefault();

    let intent = "intent://" + url.replace(/^https?:\/\//, '') + "#Intent;scheme=https;package=com.android.chrome;end";
    window.location.href = intent;
});

</script>

</body>
</html>
