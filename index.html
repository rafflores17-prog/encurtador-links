<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encurtador de Links</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Encurtador de Links</h1>
        <p>Cole sua URL longa abaixo para gerar uma versão curta.</p>
        <input type="url" id="long-url-input" placeholder="https://exemplo.com/um/link/muito/longo" required>
        <button id="shorten-btn">Encurtar</button>
        <div id="result-area" class="hidden">
            <p>Seu link curto está pronto:</p>
            <input type="text" id="short-url-output" readonly>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
