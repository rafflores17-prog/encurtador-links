<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGDV LINKS</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="app-container">

<header>
    <div class="logo">BGDV<span>LINKS</span></div>
    <p class="tagline">Encurte rápido. Compartilhe fácil.</p>
</header>

<main>

<section class="main-card">
    <input id="long-url-input" type="url" placeholder="https://exemplo.com">

    <button onclick="encurtar()" class="glow-button">ENCURTAR</button>

    <div id="result-area" style="display:none;">
        <input id="short-url-output" readonly>

        <button onclick="copiar()">COPIAR</button>
        <button onclick="abrir()">ABRIR</button>
    </div>
</section>

<section>
    <h3>Últimos links</h3>
    <div id="historico"></div>
</section>

</main>

</div>

<script>

// VALIDAR URL
function validar(url) {
    return url.startsWith("http://") || url.startsWith("https://");
}

// ENCURTAR (SIMULAÇÃO)
function encurtar() {
    let input = document.getElementById("long-url-input").value;

    if (!validar(input)) {
        alert("Digite um link válido!");
        return;
    }

    // Simula link curto
    let curto = "https://bgdv.online/" + Math.random().toString(36).substring(7);

    document.getElementById("short-url-output").value = curto;
    document.getElementById("result-area").style.display = "block";

    copiar();
    salvar(curto);
}

// COPIAR
function copiar() {
    let texto = document.getElementById("short-url-output").value;
    navigator.clipboard.writeText(texto);
}

// ABRIR LINK (FORÇA FORA DO APP)
function abrir() {
    let url = document.getElementById("short-url-output").value;

    let intent = "intent://" + url.replace(/^https?:\/\//, '') + "#Intent;scheme=https;package=com.android.chrome;end";

    window.location.href = intent;
}

// HISTÓRICO
function salvar(link) {
    let lista = JSON.parse(localStorage.getItem("links") || "[]");

    lista.unshift(link);
    localStorage.setItem("links", JSON.stringify(lista.slice(0, 5)));

    carregar();
}

function carregar() {
    let lista = JSON.parse(localStorage.getItem("links") || "[]");
    let div = document.getElementById("historico");

    div.innerHTML = "";

    lista.forEach(l => {
        let el = document.createElement("div");
        el.innerHTML = `<a href="${l}" target="_blank">${l}</a>`;
        div.appendChild(el);
    });
}

carregar();

// ABRIR LINKS EXTERNOS FORA DO APP
document.addEventListener("click", function(e) {
    let link = e.target.closest("a");
    if (!link) return;

    let url = link.href;

    if (url.includes("bgdv.online")) return;

    e.preventDefault();

    let intent = "intent://" + url.replace(/^https?:\/\//, '') + "#Intent;scheme=https;package=com.android.chrome;end";

    window.location.href = intent;
});

</script>

</body>
</html>
