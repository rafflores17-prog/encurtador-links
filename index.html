<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encurtador de Links</title>
  <style>
    body {
      background: #f9fafb;
      font-family: "Poppins", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 90%;
      max-width: 400px;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 16px;
    }
    button {
      width: 100%;
      background: #22c55e;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #16a34a;
    }
    .resultado {
      margin-top: 1rem;
      font-size: 15px;
      color: #111;
      word-break: break-all;
    }
    footer {
      margin-top: 2rem;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🔗 Encurtador de Links</h2>
    <input id="urlInput" type="url" placeholder="Cole sua URL aqui..." />
    <button id="btnEncurtar">Encurtar</button>
    <div class="resultado" id="resultado"></div>
    <footer>Feito com 💚 usando Supabase + Render</footer>
  </div>

  <script>
    const input = document.getElementById("urlInput");
    const btn = document.getElementById("btnEncurtar");
    const resultado = document.getElementById("resultado");

    btn.addEventListener("click", async () => {
      const url = input.value.trim();

      if (!url) {
        alert("Por favor, insira uma URL válida!");
        return;
      }

      resultado.textContent = "Gerando link curto...";

      try {
        // Chama a rota /encurtar do servidor
        const resp = await fetch(`/encurtar?url=${encodeURIComponent(url)}`);
        const data = await resp.json();

        if (data.link_curto) {
          resultado.innerHTML = `
            ✅ Seu link curto:<br>
            <a href="${data.link_curto}" target="_blank">${data.link_curto}</a>
          `;
        } else {
          resultado.textContent = data.erro || "Erro ao encurtar o link.";
        }
      } catch (err) {
        console.error(err);
        alert("Erro de conexão com o servidor.");
        resultado.textContent = "";
      }
    });
  </script>
</body>
</html>
