<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniLinkXPRO - Encurtador de Links</title>
  <style>
    body {
      background: #f9fafb;
      font-family: "Poppins", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 90%;
      max-width: 400px;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }
    h1 span {
      color: #22c55e;
      font-size: 2rem;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 16px;
    }
    button {
      width: 100%;
      background: #22c55e;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #16a34a;
    }
    .resultado {
      margin-top: 1rem;
      display: none;
      text-align: center;
    }
    .caixa-link {
      background: #f3f4f6;
      border-radius: 10px;
      padding: 12px;
      box-shadow: inset 0 3px 6px rgba(0,0,0,0.15);
      margin-top: 8px;
    }
    .caixa-link input {
      border: none;
      background: transparent;
      text-align: center;
      font-size: 15px;
      width: 100%;
      color: #111;
      outline: none;
    }
    .copiar-btn {
      margin-top: 8px;
      background: #16a34a;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .copiar-btn:hover {
      background: #15803d;
    }
    footer {
      margin-top: 2rem;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MiniLink<span>XPRO</span></h1>

    <input id="urlInput" type="url" placeholder="Cole sua URL aqui..." />
    <button id="btnEncurtar">Encurtar</button>

    <!-- 📍 1° ADS: Native Banner (logo abaixo do botão) -->
    <div style="margin-top: 1rem;">
      <script async="async" data-cfasync="false" src="//victimfatalsentiments.com/5550de8676aa75b2113485d3be8bf344/invoke.js"></script>
      <div id="container-5550de8676aa75b2113485d3be8bf344"></div>
    </div>

    <div class="resultado" id="resultado"></div>

    <!-- 📍 2° ADS: 320x50 Banner (acima do rodapé) -->
    <div style="margin-top: 1.5rem;">
      <script type="text/javascript">
        atOptions = {
          'key' : '90c76a0706de2344e105d816ad4badeb',
          'format' : 'iframe',
          'height' : 50,
          'width' : 320,
          'params' : {}
        };
      </script>
      <script type="text/javascript" src="//victimfatalsentiments.com/90c76a0706de2344e105d816ad4badeb/invoke.js"></script>
    </div>

    <footer>© 2025 <strong>MiniLinkXPRO</strong> — Todos os direitos reservados.</footer>
  </div>

  <script>
    const input = document.getElementById("urlInput");
    const btn = document.getElementById("btnEncurtar");
    const resultado = document.getElementById("resultado");

    btn.addEventListener("click", async () => {
      const url = input.value.trim();

      if (!url) {
        alert("Por favor, insira uma URL válida!");
        return;
      }

      resultado.style.display = "block";
      resultado.innerHTML = "Gerando link curto...";

      try {
        const resp = await fetch(`/encurtar?url=${encodeURIComponent(url)}`);
        const data = await resp.json();

        if (data.link_curto) {
          resultado.innerHTML = `
            ✅ Seu link curto:
            <div class="caixa-link">
              <input id="linkCurto" type="text" value="${data.link_curto}" readonly>
            </div>
            <button class="copiar-btn" onclick="copiarLink()">Copiar</button>
          `;
        } else {
          resultado.textContent = data.erro || "Erro ao encurtar o link.";
        }
      } catch (err) {
        console.error(err);
        alert("Erro de conexão com o servidor.");
        resultado.textContent = "";
      }
    });

    function copiarLink() {
      const linkInput = document.getElementById("linkCurto");
      linkInput.select();
      document.execCommand("copy");
      alert("Link copiado!");
    }
  </script>
</body>
</html>
