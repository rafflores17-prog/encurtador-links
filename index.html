<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BGDV LINKS | Premium Shortener</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Ajustes de Layout */
        .copy-wrapper {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            align-items: center;
        }

        .copy-wrapper input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #fff;
            font-size: 14px;
        }

        .btn-open {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .inner-copy {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .slug-input {
            margin-top: 10px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            width: 100%;
            background: #1e293b;
            color: #fff;
            box-sizing: border-box;
        }

        /* Classe para esconder/mostrar */
        .hidden { display: none; }
        
        .animate-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="app-container">
    <header>
        <div class="logo">BGDV<span>LINKS</span></div>
        <p class="tagline">O seu encurtador inteligente</p>
    </header>

    <main>
        <section class="main-card">
            <div class="input-group">
                <label>Cole sua URL longa</label>
                <input id="long-url-input" type="url" placeholder="https://exemplo.com" required />
            </div>

            <input id="slug-input" class="slug-input" placeholder="Personalizar link (opcional) ex: meu-link">

            <button id="shorten-btn" class="glow-button" style="width: 100%; margin-top: 15px; padding: 15px; border-radius: 8px; cursor: pointer;">
                ENCURTAR LINK
            </button>

            <div id="result-area" class="hidden animate-in">
                <div class="result-box" style="margin-top: 20px; padding: 15px; border: 1px dashed #3b82f6; border-radius: 10px;">
                    <label style="display: block; margin-bottom: 5px;">Seu link curto pronto:</label>
                    <div class="copy-wrapper">
                        <input type="text" id="short-url-output" readonly>
                        <button onclick="copiarLink()" class="inner-copy">Copiar</button>
                        <button onclick="abrirLink()" class="btn-open">Abrir</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 BGDV LINKS - Todos os direitos reservados.</p>
        <nav>
            <a href="/privacidade.html">Privacidade</a> • 
            <a href="/termos.html">Termos</a> • 
            <a href="/dicas.html">Dicas</a>
        </nav>
    </footer>
</div>

<script>
// --- LÓGICA PRINCIPAL ---

const shortenBtn = document.getElementById("shorten-btn");
const resultArea = document.getElementById("result-area");
const longUrlInput = document.getElementById("long-url-input");
const slugInput = document.getElementById("slug-input");
const shortUrlOutput = document.getElementById("short-url-output");

// VALIDAR URL
function validarURL(url) {
    try {
        let u = new URL(url);
        return u.protocol === "http:" || u.protocol === "https:";
    } catch {
        return false;
    }
}

// AÇÃO DE ENCURTAR
shortenBtn.addEventListener("click", function() {
    let url = longUrlInput.value.trim();
    let slug = slugInput.value.trim();

    if (!validarURL(url)) {
        alert("Por favor, insira uma URL válida!");
        return;
    }

    // Lógica para gerar o link (Aqui você integraria com seu backend/API)
    // Se for apenas front-end por enquanto, simulamos:
    let base = "bgdv.online/";
    let finalSlug = slug !== "" ? slug : Math.random().toString(36).substring(2, 7);
    
    shortUrlOutput.value = base + finalSlug;
    
    // Mostra o resultado
    resultArea.classList.remove("hidden");
});

// COPIAR
function copiarLink() {
    shortUrlOutput.select();
    navigator.clipboard.writeText(shortUrlOutput.value);
    alert("Link copiado com sucesso!");
}

// ABRIR NO CHROME (FORÇAR INTENT)
function abrirLink() {
    let url = shortUrlOutput.value;
    if (!url) return;
    
    // Adiciona o protocolo se não tiver
    let linkCompleto = url.startsWith('http') ? url : 'https://' + url;
    
    // Intent para abrir diretamente no Chrome do Android
    let intent = "intent://" + linkCompleto.replace(/^https?:\/\//, '') + "#Intent;scheme=https;package=com.android.chrome;end";
    window.location.href = intent;
}

// INTERCEPTAR LINKS EXTERNOS DO RODAPÉ (OPCIONAL)
document.addEventListener("click", function(e) {
    let link = e.target.closest("a");
    if (!link) return;
    
    // Se o link for interno (termos, dicas, etc), deixa o navegador abrir normal
    if (link.getAttribute('href').startsWith('/') || link.href.includes("bgdv.online")) {
        return;
    }

    // Se for link externo, força o Chrome
    e.preventDefault();
    let intent = "intent://" + link.href.replace(/^https?:\/\//, '') + "#Intent;scheme=https;package=com.android.chrome;end";
    window.location.href = intent;
});
</script>

</body>
</html>
