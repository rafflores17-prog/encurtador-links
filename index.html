<body>
  <div class="container">
    <h1>MiniLink<span>XPRO</span></h1>

    <input id="urlInput" type="url" placeholder="Cole sua URL aqui..." />

    <!-- 📍 1° ADS -->

      <script async="async" data-cfasync="false" src="//victimfatalsentiments.com/5550de8676aa75b2113485d3be8bf344/invoke.js"></script>

    </div>

    <div class="resultado" id="resultado"></div>

    <!-- 📍 2° ADS -->
    <div style="margin-top: 1.8rem;">
      <script type="text/javascript">
        atOptions = {
          'key' : '90c76a0706de2344e105d816ad4badeb',
          'format' : 'iframe',
          'height' : 50,
          'width' : 320,
          'params' : {}
        };
      </script>
      <script type="text/javascript" src="//victimfatalsentiments.com/90c76a0706de2344e105d816ad4badeb/invoke.js"></script>
    </div>

    <footer>🔗 © 2025 <strong>MiniLinkXPRO</strong> — Todos os direitos reservados.</footer>
  </div>

  <div class="popup" id="popup">✅ Seu link foi copiado!</div>

  <script>
    const input = document.getElementById("urlInput");
    const btn = document.getElementById("btnEncurtar");
    const resultado = document.getElementById("resultado");
    const popup = document.getElementById("popup");

    btn.addEventListener("click", async () => {
      const url = input.value.trim();

      if (!url) {
        alert("Por favor, insira uma URL válida!");
        return;
      }

      resultado.style.display = "block";
      resultado.textContent = "Gerando link curto...";

      try {
        const resp = await fetch(`/encurtar?url=${encodeURIComponent(url)}`);
        const data = await resp.json();

        if (data.link_curto) {
          resultado.innerHTML = `
            ✅ Seu link curto:<br>
            <input type="text" value="${data.link_curto}" id="shortLink" readonly style="width:100%;text-align:center;border:none;background:#fff;padding:8px;border-radius:8px;font-size:15px;box-shadow:inset 0 2px 5px rgba(0,0,0,0.15);margin-top:10px;">
            <button class="copy-btn" onclick="copiarLink()">Copiar</button>
          `;
        } else {
          resultado.textContent = data.erro || "Erro ao encurtar o link.";
        }
      } catch (err) {
        console.error(err);
        alert("Erro de conexão com o servidor.");
        resultado.textContent = "";
      }
    });

    function copiarLink() {
      const link = document.getElementById("shortLink");
      link.select();
      document.execCommand("copy");

      popup.style.display = "block";
      setTimeout(() => { popup.style.display = "none"; }, 1500);
    }
  </script>
</body>
